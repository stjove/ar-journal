<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100%; overflow:hidden; background:#000; }
    #container { position:relative; width:100%; height:100%; }
    #container video, #container canvas {
      position:absolute !important;
      top:0 !important; left:0 !important;
      width:100% !important; height:100% !important;
      object-fit:cover !important;
    }
    #tap-prompt {
      display:none;
      position:fixed; bottom:5rem; left:50%;
      transform:translateX(-50%);
      background:rgba(26,20,16,0.85);
      border:1px solid rgba(196,168,130,0.5);
      color:#f5f0e8; font-family:monospace;
      font-size:0.8rem; letter-spacing:0.15em;
      padding:0.75rem 1.5rem; text-transform:uppercase;
      z-index:999; cursor:pointer; white-space:nowrap;
    }
    #debug {
      position:fixed; top:0.5rem; left:50%;
      transform:translateX(-50%);
      background:rgba(0,0,0,0.6); color:#c4a882;
      font-family:monospace; font-size:0.65rem;
      padding:0.3rem 0.75rem; z-index:999;
      pointer-events:none; letter-spacing:0.1em; white-space:nowrap;
    }
  </style>

  <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
      "mindar-image-three": "https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"
    }
  }
  </script>
</head>
<body>
<div id="debug">Initialising…</div>
<div id="tap-prompt" onclick="window._resumeVideo && window._resumeVideo()">▶ Tap to play video</div>
<div id="container"></div>

<script type="module">
import * as THREE from 'three';
import { MindARThree } from 'mindar-image-three';

var dbg = document.getElementById('debug');
var tapPrompt = document.getElementById('tap-prompt');
function setDebug(msg) { dbg.textContent = msg; }

setDebug('MindAR loaded OK');

// Read entries from localStorage
var entries = [];
try {
  var raw = localStorage.getItem('journal-entries');
  if (raw) entries = JSON.parse(raw);
} catch(e) { setDebug('Error reading entries'); }

var MARKER_BASE = window.location.href.replace(/\/[^/]*$/, '') + '/markers/';
var entry = entries.find(e => !!e.videoUrl);

if (!entry) {
  setDebug('No entries with video — add one in Manage Entries');
} else {
  var mindFile = MARKER_BASE + entry.id + '/marker.mind';
  setDebug('Loading marker: ' + entry.id);

  // Video element
  var videoEl = document.createElement('video');
  videoEl.src = entry.videoUrl;
  videoEl.loop = true;
  videoEl.muted = true;
  videoEl.playsInline = true;
  videoEl.setAttribute('playsinline', '');
  videoEl.setAttribute('webkit-playsinline', '');
  videoEl.crossOrigin = 'anonymous';
  videoEl.preload = 'auto';
  document.body.appendChild(videoEl);

  videoEl.addEventListener('error', () => {
    setDebug('Video error: ' + (videoEl.error ? videoEl.error.code : '?'));
  });
  videoEl.addEventListener('canplay', () => setDebug('Video ready — waiting for marker'));

  window._resumeVideo = function() {
    videoEl.play().then(() => {
      tapPrompt.style.display = 'none';
      setDebug('Playing ✓');
    }).catch(e => setDebug('Play error: ' + e.message));
  };

  const mindarThree = new MindARThree({
    container: document.getElementById('container'),
    imageTargetSrc: mindFile,
    maxTrack: 1,
  });

  const { renderer, scene, camera } = mindarThree;

  const videoTexture = new THREE.VideoTexture(videoEl);
  videoTexture.minFilter = THREE.LinearFilter;
  videoTexture.magFilter = THREE.LinearFilter;

  const geometry = new THREE.PlaneGeometry(1, 0.5625);
  const material = new THREE.MeshBasicMaterial({ map: videoTexture, side: THREE.DoubleSide });
  const plane = new THREE.Mesh(geometry, material);

  const anchor = mindarThree.addAnchor(0);
  anchor.group.add(plane);

  anchor.onTargetFound = () => {
    setDebug('Marker found');
    videoEl.play().then(() => {
      tapPrompt.style.display = 'none';
      setDebug('Playing ✓');
    }).catch(() => {
      tapPrompt.style.display = 'block';
      setDebug('Tap to play');
    });
  };

  anchor.onTargetLost = () => {
    videoEl.pause();
    setDebug('Marker lost — waiting');
  };

  try {
    await mindarThree.start();
    setDebug('Ready — point at photo');
    renderer.setAnimationLoop(() => renderer.render(scene, camera));
  } catch(err) {
    setDebug('Start error: ' + err.message);
  }
}
</script>
</body>
</html>
