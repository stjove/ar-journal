<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100%; overflow:hidden; background:#000; }
    #container { position:relative; width:100%; height:100%; }
    #container video, #container canvas {
      position:absolute !important; top:0 !important; left:0 !important;
      width:100% !important; height:100% !important; object-fit:cover !important;
    }
    #tap-prompt {
      display:none; position:fixed; bottom:5rem; left:50%;
      transform:translateX(-50%);
      background:rgba(26,20,16,0.85); border:1px solid rgba(196,168,130,0.5);
      color:#f5f0e8; font-family:monospace; font-size:0.8rem;
      letter-spacing:0.15em; padding:0.75rem 1.5rem; text-transform:uppercase;
      z-index:999; cursor:pointer; white-space:nowrap;
    }
    #debug {
      position:fixed; top:0.5rem; left:50%; transform:translateX(-50%);
      background:rgba(0,0,0,0.6); color:#c4a882; font-family:monospace;
      font-size:0.65rem; padding:0.3rem 0.75rem; z-index:999;
      pointer-events:none; letter-spacing:0.1em; white-space:nowrap;
    }
  </style>
</head>
<body>
<div id="debug">Loading MindAR…</div>
<div id="tap-prompt" onclick="window._resume&&window._resume()">▶ Tap to play video</div>
<div id="container"></div>

<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.1.5/dist/mindar-image-three.prod.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
var dbg = document.getElementById('debug');
var tap = document.getElementById('tap-prompt');
function log(m) { dbg.textContent = m; console.log(m); }

if (!window.MINDAR) { log('MindAR not found'); }
else {
  log('MindAR OK — reading entries');

  var entries = [];
  try { entries = JSON.parse(localStorage.getItem('journal-entries') || '[]'); } catch(e) {}

  var BASE = window.location.href.replace(/\/[^/]*$/, '') + '/markers/';
  var entry = entries.find(function(e){ return !!e.videoUrl; });

  if (!entry) { log('No video entries found'); }
  else {
    var mindFile = BASE + entry.id + '/marker.mind';
    log('Starting: ' + entry.id);

    var vid = document.createElement('video');
    vid.src = entry.videoUrl;
    log('Video src: ' + entry.videoUrl);
    vid.loop = true; vid.muted = true;
    vid.setAttribute('playsinline','');
    vid.setAttribute('webkit-playsinline','');
    vid.crossOrigin = 'anonymous';
    document.body.appendChild(vid);

    vid.onerror = function(){ log('Video error ' + (vid.error ? vid.error.code : '?')); };
    vid.oncanplay = function(){ log('Video ready'); };

    window._resume = function(){
      vid.play().then(function(){ tap.style.display='none'; log('Playing'); })
               .catch(function(e){ log('Play err: '+e.message); });
    };

    var mindarThree = new window.MINDAR.IMAGE.MindARThree({
      container: document.getElementById('container'),
      imageTargetSrc: mindFile,
      maxTrack: 1
    });

    var renderer = mindarThree.renderer;
    var scene = mindarThree.scene;
    var camera = mindarThree.camera;

    var tex = new THREE.VideoTexture(vid);
    tex.minFilter = THREE.LinearFilter;
    var mesh = new THREE.Mesh(
      new THREE.PlaneGeometry(1, 0.5625),
      new THREE.MeshBasicMaterial({ map: tex, side: THREE.DoubleSide })
    );

    var anchor = mindarThree.addAnchor(0);
    anchor.group.add(mesh);

    anchor.onTargetFound = function(){
      log('Marker found — playing');
      vid.play().then(function(){ tap.style.display='none'; log('Playing'); })
               .catch(function(){ tap.style.display='block'; log('Tap to play'); });
    };
    anchor.onTargetLost = function(){ vid.pause(); log('Marker lost'); };

    mindarThree.start().then(function(){
      log('Ready — point at photo');
      renderer.setAnimationLoop(function(){ renderer.render(scene, camera); });
    }).catch(function(e){ log('Start error: '+e.message); });
  }
}
</script>
</body>
</html>
