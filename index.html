<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>AR Journal</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Courier+Prime&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #1a1410;
      --paper: #f5f0e8;
      --sepia: #8b6f47;
      --accent: #c4a882;
      --faint: #e8e0d0;
    }

    body {
      background: var(--ink);
      color: var(--paper);
      font-family: 'Cormorant Garamond', serif;
      min-height: 100dvh;
      overflow-x: hidden;
    }

    /* ── SCREENS ── */
    .screen {
      display: none;
      min-height: 100dvh;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      position: relative;
    }
    .screen.active { display: flex; }

    /* ── HOME ── */
    #home {
      background: var(--ink);
      text-align: center;
      gap: 2rem;
    }

    .home-grain {
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    .home-content { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; gap: 2rem; }

    .journal-title {
      font-size: clamp(2.5rem, 8vw, 4rem);
      font-weight: 300;
      letter-spacing: 0.15em;
      line-height: 1.1;
      color: var(--paper);
    }

    .journal-title em {
      display: block;
      font-style: italic;
      color: var(--accent);
      font-size: 0.6em;
      letter-spacing: 0.3em;
      margin-bottom: 0.5rem;
    }

    .divider {
      width: 120px;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--sepia), transparent);
    }

    .subtitle {
      font-size: 0.95rem;
      letter-spacing: 0.2em;
      color: var(--accent);
      font-weight: 300;
      font-family: 'Courier Prime', monospace;
      text-transform: uppercase;
    }

    .btn-group { display: flex; flex-direction: column; gap: 1rem; width: 100%; max-width: 280px; }

    .btn {
      padding: 1rem 2rem;
      border: 1px solid var(--sepia);
      background: transparent;
      color: var(--paper);
      font-family: 'Courier Prime', monospace;
      font-size: 0.8rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--sepia);
      transform: translateX(-100%);
      transition: transform 0.3s ease;
      z-index: -1;
    }

    .btn:hover::before, .btn:active::before { transform: translateX(0); }
    .btn:hover, .btn:active { border-color: var(--accent); color: var(--ink); }

    .btn.primary {
      background: var(--sepia);
      color: var(--ink);
      border-color: var(--sepia);
    }
    .btn.primary::before { background: var(--accent); }

    /* ── AR SCREEN ── */
    #ar-screen {
      padding: 0;
      justify-content: flex-start;
      background: #000;
      position: relative;
    }

    #ar-iframe {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      border: none;
      background: #000;
      z-index: 0;
    }

    .ar-ui {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 999;
      padding: 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      pointer-events: none;
    }

    .ar-hint {
      background: rgba(26,20,16,0.75);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(196,168,130,0.3);
      padding: 0.6rem 1rem;
      font-family: 'Courier Prime', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      color: var(--accent);
      text-transform: uppercase;
    }

    .ar-back {
      pointer-events: all;
      background: rgba(26,20,16,0.75);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(196,168,130,0.3);
      padding: 0.6rem 1rem;
      font-family: 'Courier Prime', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      color: var(--paper);
      text-transform: uppercase;
      cursor: pointer;
    }

    /* ── VIDEO OVERLAY ── */
    #video-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(10,8,6,0.92);
      backdrop-filter: blur(12px);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      gap: 1.5rem;
    }
    #video-overlay.visible { display: flex; }

    .video-meta {
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .video-entry-title {
      font-size: 1.6rem;
      font-weight: 300;
      letter-spacing: 0.1em;
      color: var(--paper);
    }

    .video-entry-date {
      font-family: 'Courier Prime', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      color: var(--sepia);
      text-transform: uppercase;
    }

    .video-wrapper {
      width: 100%;
      max-width: 560px;
      aspect-ratio: 16/9;
      border: 1px solid rgba(139,111,71,0.4);
      position: relative;
      overflow: hidden;
    }

    .video-wrapper iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .video-close {
      font-family: 'Courier Prime', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.25em;
      color: var(--sepia);
      text-transform: uppercase;
      cursor: pointer;
      border: none;
      background: none;
      padding: 0.5rem 1rem;
      transition: color 0.2s;
    }
    .video-close:hover { color: var(--accent); }

    /* ── QR SCREEN ── */
    #qr-screen {
      background: var(--ink);
      gap: 2rem;
      text-align: center;
    }

    #qr-screen h2 {
      font-size: 1.8rem;
      font-weight: 300;
      letter-spacing: 0.15em;
      color: var(--paper);
    }

    #qr-reader {
      width: 100%;
      max-width: 340px;
      border: 1px solid var(--sepia);
      overflow: hidden;
    }

    #qr-reader video { width: 100% !important; }

    .qr-hint {
      font-family: 'Courier Prime', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      color: var(--sepia);
      text-transform: uppercase;
      max-width: 280px;
      line-height: 1.8;
    }

    /* ── MANAGE SCREEN ── */
    #manage-screen {
      background: var(--ink);
      gap: 1.5rem;
      justify-content: flex-start;
      padding-top: 4rem;
      align-items: stretch;
      max-width: 600px;
      margin: 0 auto;
      width: 100%;
    }

    #manage-screen h2 {
      font-size: 1.8rem;
      font-weight: 300;
      letter-spacing: 0.15em;
      color: var(--paper);
      text-align: center;
    }

    .entry-form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      border: 1px solid rgba(139,111,71,0.3);
      padding: 1.5rem;
    }

    .field-label {
      font-family: 'Courier Prime', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      color: var(--sepia);
      text-transform: uppercase;
      margin-bottom: 0.3rem;
      display: block;
    }

    .field-input {
      width: 100%;
      background: rgba(245,240,232,0.05);
      border: 1px solid rgba(139,111,71,0.4);
      color: var(--paper);
      font-family: 'Courier Prime', monospace;
      font-size: 0.85rem;
      padding: 0.7rem 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .field-input:focus { border-color: var(--accent); }
    .field-input::placeholder { color: rgba(196,168,130,0.3); }

    .entries-list {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      overflow-y: auto;
      max-height: 40dvh;
    }

    .entry-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border: 1px solid rgba(139,111,71,0.2);
      padding: 0.75rem 1rem;
      gap: 1rem;
    }

    .entry-item-info {
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
      overflow: hidden;
    }

    .entry-item-title {
      font-size: 0.95rem;
      font-weight: 400;
      color: var(--paper);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .entry-item-id {
      font-family: 'Courier Prime', monospace;
      font-size: 0.65rem;
      color: var(--sepia);
      letter-spacing: 0.1em;
    }

    .entry-delete {
      background: none;
      border: 1px solid rgba(139,111,71,0.3);
      color: var(--sepia);
      font-family: 'Courier Prime', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      padding: 0.3rem 0.6rem;
      cursor: pointer;
      flex-shrink: 0;
      transition: all 0.2s;
    }
    .entry-delete:hover { border-color: #c04040; color: #c04040; }

    .empty-state {
      font-family: 'Courier Prime', monospace;
      font-size: 0.75rem;
      color: var(--sepia);
      letter-spacing: 0.15em;
      text-align: center;
      padding: 2rem;
      opacity: 0.6;
    }

    .back-link {
      font-family: 'Courier Prime', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      color: var(--sepia);
      text-transform: uppercase;
      cursor: pointer;
      text-align: center;
      padding: 0.5rem;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--accent); }

    /* ── STATUS TOAST ── */
    #toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(4rem);
      background: rgba(26,20,16,0.95);
      border: 1px solid var(--sepia);
      padding: 0.75rem 1.5rem;
      font-family: 'Courier Prime', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      color: var(--accent);
      text-transform: uppercase;
      z-index: 9999;
      transition: transform 0.3s ease;
      white-space: nowrap;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<div class="home-grain"></div>

<!-- ── HOME ── -->
<div id="home" class="screen active">
  <div class="home-content">
    <div>
      <div class="journal-title">
        <em>my</em>
        Journal
      </div>
    </div>
    <div class="divider"></div>
    <div class="subtitle">Augmented Archive</div>
    <div class="btn-group">
      <button class="btn primary" onclick="startAR()">Scan a Photo</button>
      <button class="btn" onclick="showScreen('qr-screen'); startQR()">Scan a QR Code</button>
      <button class="btn" onclick="showScreen('manage-screen'); renderEntries()">Manage Entries</button>
    </div>
  </div>
</div>

<!-- ── AR SCREEN ── -->
<div id="ar-screen" class="screen">
  <iframe id="ar-iframe" allow="camera" style="position:absolute;top:0;left:0;width:100%;height:100%;border:none;background:#000;z-index:0;"></iframe>
  <div class="ar-ui">
    <div class="ar-hint">Point at a journal photo</div>
    <button class="ar-back" onclick="stopAR()">← Back</button>
  </div>
</div>

<!-- ── VIDEO OVERLAY ── -->
<div id="video-overlay">
  <div class="video-meta">
    <div class="video-entry-title" id="overlay-title"></div>
    <div class="video-entry-date" id="overlay-date"></div>
  </div>
  <div class="video-wrapper">
    <iframe id="overlay-iframe" allowfullscreen allow="autoplay"></iframe>
  </div>
  <button class="video-close" onclick="closeVideo()">✕ &nbsp; Close</button>
</div>

<!-- ── QR SCREEN ── -->
<div id="qr-screen" class="screen">
  <h2>Scan QR Code</h2>
  <div id="qr-reader"></div>
  <div class="qr-hint">Point your camera at a QR code printed on a journal page</div>
  <button class="btn" onclick="stopQR(); showScreen('home')">← Back</button>
</div>

<!-- ── MANAGE SCREEN ── -->
<div id="manage-screen" class="screen">
  <h2>Entries</h2>

  <div class="entry-form">
    <div>
      <label class="field-label">Entry ID (unique, no spaces)</label>
      <input class="field-input" id="input-id" placeholder="e.g. xavier-misty-silhouette" />
    </div>
    <div>
      <label class="field-label">Title</label>
      <input class="field-input" id="input-title" placeholder="Xavier — Misty Silhouette" />
    </div>
    <div>
      <label class="field-label">Date</label>
      <input class="field-input" id="input-date" placeholder="March 2026" />
    </div>
    <div>
      <label class="field-label">YouTube URL (for QR fallback)</label>
      <input class="field-input" id="input-url" placeholder="https://www.youtube.com/watch?v=..." />
    </div>

    <button class="btn primary" onclick="addEntry()">Add Entry</button>
  </div>

  <div class="entries-list" id="entries-list"></div>
  <div class="back-link" onclick="showScreen('home')">← Back to journal</div>
</div>

<!-- ── TOAST ── -->
<div id="toast"></div>

<!-- QR Scanner library -->
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

<script>
// ── DATA ── stored in memory (add localStorage later if needed)
let entries = JSON.parse(localStorage.getItem('journal-entries') || '[]');

  saveEntries();
}

function saveEntries() {
  localStorage.setItem('journal-entries', JSON.stringify(entries));
}

// ── UTILS ──
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function ytEmbedUrl(url) {
  const match = url.match(/(?:v=|youtu\.be\/)([A-Za-z0-9_-]{11})/);
  return match ? `https://www.youtube.com/embed/${match[1]}?autoplay=1` : null;
}

// ── VIDEO OVERLAY ──
function openVideo(entryId) {
  const entry = entries.find(e => e.id === entryId);
  if (!entry) return;
  const embedUrl = ytEmbedUrl(entry.youtubeUrl);
  if (!embedUrl) return;
  document.getElementById('overlay-title').textContent = entry.title;
  document.getElementById('overlay-date').textContent = entry.date;
  document.getElementById('overlay-iframe').src = embedUrl;
  document.getElementById('video-overlay').classList.add('visible');
}

function closeVideo() {
  document.getElementById('video-overlay').classList.remove('visible');
  document.getElementById('overlay-iframe').src = '';
}

// ── AR (NFT image tracking via iframe) ──
const MARKER_BASE = window.location.href.replace(/\/[^/]*$/, '') + '/markers/';

function buildARDoc(entries) {
  const markerTags = entries.map(entry => {
    const markerPath = MARKER_BASE + entry.id + '/marker';
    const hasVideo = !!entry.videoUrl;
    const videoId = 'vid-' + entry.id;

    const videoAsset = hasVideo
      ? `<video id="${videoId}" src="${entry.videoUrl}" loop crossorigin="anonymous" playsinline webkit-playsinline preload="auto" style="display:none"></video>`
      : '';

    const planeTag = hasVideo
      ? `<a-plane position="0 0 0" rotation="-90 0 0" width="1.6" height="0.9" material="src:#${videoId}; shader:flat;"></a-plane>`
      : `<a-plane color="transparent" opacity="0" rotation="-90 0 0" width="1" height="1"></a-plane>`;

    const onFound = hasVideo
      ? `this.querySelector('[material]') && document.getElementById('${videoId}').play();`
      : `window.parent.postMessage({type:'markerFound',entryId:'${entry.id}'},'*');`;

    const onLost = hasVideo
      ? `document.getElementById('${videoId}').pause();`
      : '';

    return `
      ${videoAsset}
      <a-nft type="nft" url="${markerPath}" smooth="true" smoothCount="10" smoothTolerance="0.01" smoothThreshold="5"
        on-nft-found="${onFound}"
        on-nft-lost="${onLost}">
        ${planeTag}
      </a-nft>`;
  }).join('\n');

  return `<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100%; overflow:hidden; background:transparent; }
    a-scene { width:100% !important; height:100% !important; }
    /* Make AR.js camera feed visible */
    video { position:fixed !important; top:0 !important; left:0 !important; width:100% !important; height:100% !important; object-fit:cover !important; z-index:0 !important; }
    canvas { position:fixed !important; top:0 !important; left:0 !important; width:100% !important; height:100% !important; z-index:1 !important; background:transparent !important; }
    #tap-prompt {
      display:none;
      position:fixed;
      bottom:5rem;
      left:50%;
      transform:translateX(-50%);
      background:rgba(26,20,16,0.85);
      border:1px solid rgba(196,168,130,0.5);
      color:#f5f0e8;
      font-family:monospace;
      font-size:0.8rem;
      letter-spacing:0.15em;
      padding:0.75rem 1.5rem;
      text-transform:uppercase;
      z-index:999;
      cursor:pointer;
    }
    #debug {
      position:fixed;
      top:0.5rem;
      left:50%;
      transform:translateX(-50%);
      background:rgba(0,0,0,0.6);
      color:#c4a882;
      font-family:monospace;
      font-size:0.65rem;
      padding:0.3rem 0.75rem;
      z-index:999;
      pointer-events:none;
      letter-spacing:0.1em;
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/aframe/1.4.2/aframe.min.js"><\/script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"><\/script>
</head>
<body>
  <div id="debug">Initialising…</div>
  <div id="tap-prompt" onclick="resumeVideo()">▶ Tap to play video</div>

  <a-scene
    embedded
    arjs="sourceType:webcam; trackingMethod:best; debugUIEnabled:false;"
    vr-mode-ui="enabled:false"
    renderer="antialias:true; alpha:true; logarithmicDepthBuffer:true;">
    <a-assets>
      ${entries.filter(e => e.videoUrl).map(e =>
        `<video id="vid-${e.id}" src="${e.videoUrl}" loop crossorigin="anonymous" playsinline webkit-playsinline preload="auto" muted></video>`
      ).join('\n      ')}
    </a-assets>
    ${entries.map(entry => {
      const markerPath = MARKER_BASE + entry.id + '/marker';
      const hasVideo = !!entry.videoUrl;
      const videoId = 'vid-' + entry.id;
      return `
    <a-nft type="nft" url="${markerPath}" smooth="true" smoothCount="10" smoothTolerance="0.01" smoothThreshold="5">
      ${hasVideo
        ? `<a-plane position="0 0 0" rotation="-90 0 0" width="1.6" height="0.9" material="src:#${videoId}; shader:flat;"></a-plane>`
        : `<a-plane color="transparent" opacity="0" rotation="-90 0 0" width="1" height="1"></a-plane>`
      }
    </a-nft>`;
    }).join('\n')}
    <a-entity camera></a-entity>
  </a-scene>

  <script>
    var dbg = document.getElementById('debug');
    var tapPrompt = document.getElementById('tap-prompt');
    var currentVideo = null;

    function setDebug(msg) { dbg.textContent = msg; }

    function resumeVideo() {
      if (currentVideo) {
        currentVideo.play().then(function() {
          tapPrompt.style.display = 'none';
          setDebug('Playing ✓');
        }).catch(function(e) {
          setDebug('Play failed: ' + e.message);
        });
      }
    }

    document.addEventListener('DOMContentLoaded', function() {
      setDebug('DOM ready, waiting for scene…');

      var scene = document.querySelector('a-scene');
      scene.addEventListener('loaded', function() {
        setDebug('Scene loaded, waiting for marker…');
      });

      ${entries.map((entry, i) => `
      (function() {
        var entryId = '${entry.id}';
        var hasVideo = ${!!entry.videoUrl};

        function attachMarker() {
          var els = document.querySelectorAll('a-nft');
          var el = els[${i}];
          if (!el) { setTimeout(attachMarker, 500); return; }

          el.addEventListener('markerFound', function() {
            setDebug('Marker found: ' + entryId);
            if (hasVideo) {
              var v = document.getElementById('vid-' + entryId);
              if (!v) { setDebug('Video element not found!'); return; }
              currentVideo = v;
              v.play().then(function() {
                setDebug('Playing ✓');
                tapPrompt.style.display = 'none';
              }).catch(function(err) {
                setDebug('Autoplay blocked — tap to play');
                tapPrompt.style.display = 'block';
              });
            } else {
              window.parent.postMessage({type:'markerFound', entryId: entryId}, '*');
            }
          });

          el.addEventListener('markerLost', function() {
            setDebug('Marker lost');
            if (hasVideo) {
              var v = document.getElementById('vid-' + entryId);
              if (v) v.pause();
            }
          });

          setDebug('Marker listener attached');
        }
        attachMarker();
      })();`).join('\n')}
    });
  <\/script>
</body>
</html>`;
}

function startAR() {
  const base = window.location.href.replace(/\/[^/]*$/, '');
  window.location.href = base + '/ar.html';
}

function handleARMessage(e) {
  if (e.data && e.data.type === 'markerFound') {
    openVideo(e.data.entryId);
  }
}

function stopAR() {
  const iframe = document.getElementById('ar-iframe');
  iframe.src = 'about:blank';
  window.removeEventListener('message', handleARMessage);
  showScreen('home');
}

// ── QR ──
let qrScanner = null;

function startQR() {
  qrScanner = new Html5Qrcode('qr-reader');
  qrScanner.start(
    { facingMode: 'environment' },
    { fps: 10, qrbox: { width: 250, height: 250 } },
    (decodedText) => {
      handleQRResult(decodedText);
    },
    () => {}
  ).catch(err => toast('Camera access denied'));
}

function stopQR() {
  if (qrScanner) {
    qrScanner.stop().catch(() => {});
    qrScanner = null;
  }
}

function handleQRResult(text) {
  stopQR();
  showScreen('home');

  // QR codes encode the entry ID directly, or a full URL with ?entry=ID
  let entryId = text.trim();
  if (entryId.includes('?entry=')) {
    entryId = new URL(entryId).searchParams.get('entry');
  }

  const entry = entries.find(e => e.id === entryId);
  if (entry) {
    setTimeout(() => openVideo(entryId), 300);
  } else {
    toast('No entry found for this code');
  }
}

// ── MANAGE ──
function addEntry() {
  const id = document.getElementById('input-id').value.trim().replace(/\s+/g, '-');
  const title = document.getElementById('input-title').value.trim();
  const date = document.getElementById('input-date').value.trim();
  const url = document.getElementById('input-url').value.trim();

  if (!id || !title || !url) { toast('ID, title and YouTube URL are required'); return; }
  if (entries.find(e => e.id === id)) { toast('ID already exists'); return; }
  if (!ytEmbedUrl(url)) { toast('Invalid YouTube URL'); return; }

  entries.push({ id, title, date, youtubeUrl: url });
  saveEntries();
  document.getElementById('input-id').value = '';
  document.getElementById('input-title').value = '';
  document.getElementById('input-date').value = '';
  document.getElementById('input-url').value = '';
  renderEntries();
  toast('Entry added');
}

function deleteEntry(id) {
  entries = entries.filter(e => e.id !== id);
  saveEntries();
  renderEntries();
  toast('Entry removed');
}

function renderEntries() {
  const list = document.getElementById('entries-list');
  if (!entries.length) {
    list.innerHTML = '<div class="empty-state">No entries yet</div>';
    return;
  }
  list.innerHTML = entries.map((e, i) => `
    <div class="entry-item">
      <div class="entry-item-info">
        <div class="entry-item-title">${e.title || e.id}</div>
        <div class="entry-item-id">Marker #${i} &nbsp;·&nbsp; ${e.id}</div>
      </div>
      <button class="entry-delete" onclick="deleteEntry('${e.id}')">Remove</button>
    </div>
  `).join('');
}

// ── DEEP LINK ── handle ?entry=ID in URL (for QR codes that link here)
const urlParams = new URLSearchParams(window.location.search);
const directEntry = urlParams.get('entry');
if (directEntry) {
  window.addEventListener('load', () => setTimeout(() => openVideo(directEntry), 500));
}
</script>
